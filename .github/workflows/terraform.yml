name: 'Terraform Infra'

on:
  push:
    branches: [ "main" ]
    paths:
      - "**.tf"
      - "**.tfvars"
  pull_request:
    branches: [ "main" ]
    paths:
      - "**.tf"
      - "**.tfvars"
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'apply'
        type: choice
        options:
          - apply
          - destroy
      allow_instance_replace:
        description: 'Allow Terraform to recreate EC2 instances'
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: terraform init

    - name: Terraform Format
      run: terraform fmt -check

    - name: Run Checkov Security Scan
      if: github.event_name != 'workflow_dispatch' || github.event.inputs.action != 'destroy'
      uses: bridgecrewio/checkov-action@master
      with:
        directory: .
        framework: terraform
        output_format: cli
        hard_fail_on: HIGH,CRITICAL
        skip_check: CKV_AWS_382,CKV2_AWS_11,CKV2_AWS_41

    - name: Terraform Plan
      if: github.event_name != 'workflow_dispatch' || github.event.inputs.action != 'destroy'
      run: terraform plan -input=false -out=tfplan

    - name: Block accidental EC2 replacement
      if: github.event_name != 'workflow_dispatch' || github.event.inputs.action != 'destroy'
      env:
        ALLOW_INSTANCE_REPLACE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.allow_instance_replace || 'false' }}
      run: |
        set -euo pipefail

        if [ "$ALLOW_INSTANCE_REPLACE" = "true" ]; then
          echo "EC2 replacement is explicitly allowed for this run."
          exit 0
        fi

        terraform show -json tfplan > tfplan.json

        replacements=$(jq -r '
          .resource_changes[]?
          | select(.type == "aws_instance")
          | select((.change.actions | index("delete")) and (.change.actions | index("create")))
          | .address
        ' tfplan.json)

        if [ -n "$replacements" ]; then
          echo "Terraform plan wants to recreate EC2 instances:" >&2
          echo "$replacements" >&2
          echo "Canceling. Re-run with allow_instance_replace=true only if this is intentional." >&2
          exit 1
        fi

    - name: Terraform Apply (manual trigger)
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'
      run: terraform apply -auto-approve -input=false tfplan

    - name: Terraform Destroy
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
      run: terraform destroy -auto-approve -input=false
