name: 'Terraform Infra'
run-name: Terraform Infra - ${{ github.event_name == 'workflow_dispatch' && inputs.action || 'plan' }}

on:
  push:
    branches: [ "main" ]
    paths:
      - "**.tf"
      - "**.tfvars"
  pull_request:
    branches: [ "main" ]
    paths:
      - "**.tf"
      - "**.tfvars"
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'apply'
        type: choice
        options:
          - apply
          - destroy
      allow_instance_replace:
        description: 'Keep false for normal apply; set true only when you intentionally want to recreate EC2'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform ${{ github.event_name == 'workflow_dispatch' && inputs.action || 'plan' }}
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Show workflow mode
      env:
        EVENT_NAME: ${{ github.event_name }}
        ACTION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action || 'plan' }}
        ALLOW_INSTANCE_REPLACE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.allow_instance_replace || 'false' }}
      run: |
        echo "Event: $EVENT_NAME"
        echo "Terraform action: $ACTION"
        echo "Allow EC2 replacement: $ALLOW_INSTANCE_REPLACE"

    - name: Terraform Init
      run: terraform init

    - name: Terraform Format
      run: terraform fmt -check

    - name: Run Checkov Security Scan
      if: github.event_name != 'workflow_dispatch' || github.event.inputs.action != 'destroy'
      uses: bridgecrewio/checkov-action@master
      with:
        directory: .
        framework: terraform
        output_format: cli
        hard_fail_on: HIGH,CRITICAL
        skip_check: CKV_AWS_382,CKV2_AWS_11,CKV2_AWS_41

    - name: Terraform Plan
      if: github.event_name != 'workflow_dispatch' || github.event.inputs.action != 'destroy'
      run: terraform plan -input=false -out=tfplan

    - name: Block accidental EC2 replacement
      if: github.event_name != 'workflow_dispatch' || github.event.inputs.action != 'destroy'
      env:
        ALLOW_INSTANCE_REPLACE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.allow_instance_replace || 'false' }}
      run: |
        set -euo pipefail

        terraform show -json tfplan > tfplan.json

        replacement_count=$(jq -r '
          [
            .resource_changes[]?
            | select(.type == "aws_instance")
            | select((.change.actions | index("delete")) and (.change.actions | index("create")))
          ]
          | length
        ' tfplan.json)

        if [ "$replacement_count" -gt 0 ]; then
          echo "Terraform plan wants to recreate EC2 instances:" >&2

          jq -r '
          .resource_changes[]?
          | select(.type == "aws_instance")
          | select((.change.actions | index("delete")) and (.change.actions | index("create")))
          | {
              address: .address,
              action_reason: (.action_reason // "-"),
              name_before: (.change.before.tags.Name // "-"),
              name_after: (.change.after.tags.Name // "-"),
              instance_id: (.change.before.id // "-"),
              private_ip_before: (.change.before.private_ip // "-"),
              private_ip_after: (.change.after.private_ip // "-"),
              instance_type_before: (.change.before.instance_type // "-"),
              instance_type_after: (.change.after.instance_type // "-"),
              ami_before: (.change.before.ami // "-"),
              ami_after: (.change.after.ami // "-"),
              replace_paths: (
                (.change.replace_paths // [])
                | map(map(tostring) | join("."))
                | join(", ")
              )
            }
          | [
              "",
              "Resource: \(.address)",
              "Name tag: \(.name_before) -> \(.name_after)",
              "Instance ID: \(.instance_id)",
              "Private IP: \(.private_ip_before) -> \(.private_ip_after)",
              "Instance type: \(.instance_type_before) -> \(.instance_type_after)",
              "AMI: \(.ami_before) -> \(.ami_after)",
              "Reason: \(.action_reason)",
              "Replace paths: \(if .replace_paths == "" then "-" else .replace_paths end)"
            ]
          | join("\n")
          ' tfplan.json >&2

          if [ "$ALLOW_INSTANCE_REPLACE" = "true" ]; then
            echo "Continuing because allow_instance_replace=true." >&2
            exit 0
          fi

          echo "Canceling. Re-run with allow_instance_replace=true only if this is intentional." >&2
          exit 1
        fi

    - name: Terraform Apply (manual trigger)
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'
      run: terraform apply -auto-approve -input=false tfplan

    - name: Terraform Destroy
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
      run: terraform destroy -auto-approve -input=false
