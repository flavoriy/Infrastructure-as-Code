name: 'Terraform'

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'apply'
        type: choice
        options:
          - apply
          - start
          - stop
          - destroy

permissions:
  contents: read

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: terraform init

    - name: Terraform Format
      run: terraform fmt -check

    - name: Run Checkov Security Scan
      if: github.event_name != 'workflow_dispatch' || github.event.inputs.action != 'destroy'
      uses: bridgecrewio/checkov-action@master
      with:
        directory: .
        framework: terraform
        output_format: cli
        hard_fail_on: HIGH,CRITICAL
        skip_check: CKV_AWS_382,CKV2_AWS_11,CKV2_AWS_41

    - name: Terraform Plan
      if: github.event_name != 'workflow_dispatch' || github.event.inputs.action != 'destroy'
      env:
        TF_ACTION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action || 'plan' }}
      run: |
        case "$TF_ACTION" in
          start)
            terraform plan -input=false -var="instance_state=running"
            ;;
          stop)
            terraform plan -input=false -var="instance_state=stopped"
            ;;
          *)
            terraform plan -input=false
            ;;
        esac

    - name: Terraform Apply (manual trigger)
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'
      run: terraform apply -auto-approve -input=false

    - name: Terraform Start Instances
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'start'
      run: terraform apply -auto-approve -input=false -var="instance_state=running"

    - name: Terraform Stop Instances
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'stop'
      run: terraform apply -auto-approve -input=false -var="instance_state=stopped"

    - name: Terraform Destroy
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
      run: terraform destroy -auto-approve -input=false
