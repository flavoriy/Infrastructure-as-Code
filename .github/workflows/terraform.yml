name: 'Terraform Infra'
run-name: Terraform Infra - ${{ github.event_name == 'workflow_dispatch' && inputs.action || 'lint' }}

# Creates or destroys Terraform-managed infrastructure.
on:
  push:
    branches: [ "main" ]
    paths:
      - "*.tf"
      - "*.tfvars"
      - "**/*.tf"
      - "**/*.tfvars"
  pull_request:
    branches: [ "main" ]
    paths:
      - "*.tf"
      - "*.tfvars"
      - "**/*.tf"
      - "**/*.tfvars"
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'apply'
        type: choice
        options:
          - apply
          - destroy

permissions:
  contents: read

jobs:
  # ────────────────────────────────────────────
  # JOB 1: Lint — runs on every push / PR
  # No AWS credentials needed
  # ────────────────────────────────────────────
  lint:
    name: Lint & Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Format Check
      run: terraform fmt -check -recursive

    - name: Run Checkov Security Scan
      uses: bridgecrewio/checkov-action@master
      with:
        directory: .
        framework: terraform
        output_format: cli
        hard_fail_on: HIGH,CRITICAL
        skip_check: CKV_AWS_382,CKV2_AWS_11,CKV2_AWS_41

  # ────────────────────────────────────────────
  # JOB 2: Apply / Destroy — manual dispatch only
  # AWS credentials configured here
  # ────────────────────────────────────────────
  deploy:
    name: Terraform ${{ inputs.action }}
    runs-on: ubuntu-latest
    environment: production
    if: github.event_name == 'workflow_dispatch'
    env:
      TF_VAR_database_url: ${{ secrets.DATABASE_URL }}
      TF_VAR_calendar_database_url: ${{ secrets.CALENDAR_DATABASE_URL }}
      TF_VAR_profile_database_url: ${{ secrets.PROFILE_DATABASE_URL }}
      TF_VAR_tasks_database_url: ${{ secrets.TASKS_DATABASE_URL }}
      TF_VAR_tikto_calendar_api_url: ${{ secrets.TIKTO_CALENDAR_API_URL }}
      TF_VAR_tikto_dashboard_api_url: ${{ secrets.TIKTO_DASHBOARD_API_URL }}
      TF_VAR_tikto_profile_api_url: ${{ secrets.TIKTO_PROFILE_API_URL }}
      TF_VAR_tikto_tasks_api_url: ${{ secrets.TIKTO_TASKS_API_URL }}
      TF_VAR_next_public_supabase_publishable_key: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      TF_VAR_sonar_token: ${{ secrets.SONAR_TOKEN }}
      TF_VAR_gitops_token: ${{ secrets.GITOPS_TOKEN }}
      TF_VAR_gitops_username: ${{ secrets.GITOPS_USERNAME }}
      TF_VAR_token_encryption_key: ${{ secrets.TOKEN_ENCRYPTION_KEY }}
      TF_VAR_tailscale_authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: terraform init

    - name: Clean up pending-delete secrets
      if: inputs.action == 'apply'
      run: |
        aws secretsmanager delete-secret --secret-id tikto/dev --force-delete-without-recovery --region ${{ secrets.AWS_REGION }} || true
        aws secretsmanager delete-secret --secret-id tikto/prod --force-delete-without-recovery --region ${{ secrets.AWS_REGION }} || true
        aws secretsmanager delete-secret --secret-id tikto/secrets --force-delete-without-recovery --region ${{ secrets.AWS_REGION }} || true

    - name: Terraform Plan
      if: inputs.action == 'apply'
      run: terraform plan -input=false -out=tfplan

    - name: Terraform Apply
      if: inputs.action == 'apply'
      run: terraform apply -auto-approve -input=false tfplan

    - name: Terraform Destroy
      if: inputs.action == 'destroy'
      run: terraform destroy -auto-approve -input=false -lock=false
