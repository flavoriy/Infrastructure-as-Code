name: 'Terraform Infra'
run-name: Terraform Infra - ${{ github.event_name == 'workflow_dispatch' && inputs.action || 'plan' }}

# Creates or destroys Terraform-managed infrastructure.
on:
  push:
    branches: [ "main" ]
    paths:
      - "*.tf"
      - "*.tfvars"
      - "**/*.tf"
      - "**/*.tfvars"
  pull_request:
    branches: [ "main" ]
    paths:
      - "*.tf"
      - "*.tfvars"
      - "**/*.tf"
      - "**/*.tfvars"
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'apply'
        type: choice
        options:
          - apply
          - destroy

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform ${{ github.event_name == 'workflow_dispatch' && inputs.action || 'plan' }}
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Show workflow mode
      env:
        EVENT_NAME: ${{ github.event_name }}
        ACTION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action || 'plan' }}
      run: |
        echo "Event: $EVENT_NAME"
        echo "Terraform action: $ACTION"

    - name: Terraform Init
      run: terraform init

    - name: Terraform Format
      run: terraform fmt -check -recursive

    - name: Run Checkov Security Scan
      if: github.event_name != 'workflow_dispatch' || github.event.inputs.action != 'destroy'
      uses: bridgecrewio/checkov-action@master
      with:
        directory: .
        framework: terraform
        output_format: cli
        hard_fail_on: HIGH,CRITICAL
        skip_check: CKV_AWS_382,CKV2_AWS_11,CKV2_AWS_41

    - name: Terraform Plan
      if: github.event_name != 'workflow_dispatch' || github.event.inputs.action != 'destroy'
      run: terraform plan -input=false -out=tfplan



    - name: Terraform Apply (manual trigger)
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'
      run: terraform apply -auto-approve -input=false tfplan

    - name: Terraform Destroy
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
      run: terraform destroy -auto-approve -input=false
