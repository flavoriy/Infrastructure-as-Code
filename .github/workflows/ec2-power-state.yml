name: 'EC2 Power State'

# Starts or stops existing EC2 instances by Name tag only.
# This workflow never runs Terraform and never creates/replaces instances.
on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Power action to perform'
        required: true
        default: 'stop'
        type: choice
        options:
          - start
          - stop

permissions:
  contents: read

jobs:
  ec2-power-state:
    name: 'EC2 Power State'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Resolve target instances
        id: resolve
        env:
          ACTION: ${{ github.event.inputs.action }}
        run: |
          set -euo pipefail

          # Read the Terraform tag prefix from the same tfvars file used by apply/destroy.
          PROJECT_NAME=$(sed -nE 's/^[[:space:]]*project_name[[:space:]]*=[[:space:]]*"([^"]+)".*$/\1/p' terraform.tfvars | head -n 1)

          if [ -z "$PROJECT_NAME" ]; then
            echo "project_name was not found in terraform.tfvars." >&2
            exit 1
          fi

          # Keep this list aligned with Terraform EC2 Name tags.
          names=(
            "$PROJECT_NAME-jenkins_server"
            "$PROJECT_NAME-jenkins_agent"
            "$PROJECT_NAME-k3s_dev"
            "$PROJECT_NAME-k3s_prod_server_1"
            "$PROJECT_NAME-k3s_prod_server_2"
            "$PROJECT_NAME-k3s_prod_server_3"
          )

          case "$ACTION" in
            start)
              # Only stopped instances need a start call.
              state_filter="stopped"
              ;;
            stop)
              # Only running instances need a stop call.
              state_filter="running"
              ;;
            *)
              echo "Unsupported action: $ACTION" >&2
              exit 1
              ;;
          esac

          values=$(IFS=,; echo "${names[*]}")
          instance_ids=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=$values" "Name=instance-state-name,Values=$state_filter" \
            --query 'Reservations[].Instances[].InstanceId' \
            --output text)

          echo "Target names: $values"
          echo "Current state filter: $state_filter"

          if [ -z "$instance_ids" ] || [ "$instance_ids" = "None" ]; then
            echo "No instances need action."
            echo "instance_ids=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Instance IDs: $instance_ids"
          echo "instance_ids=$instance_ids" >> "$GITHUB_OUTPUT"

      - name: Start instances
        if: github.event.inputs.action == 'start' && steps.resolve.outputs.instance_ids != ''
        run: aws ec2 start-instances --instance-ids ${{ steps.resolve.outputs.instance_ids }}

      - name: Stop instances
        if: github.event.inputs.action == 'stop' && steps.resolve.outputs.instance_ids != ''
        run: aws ec2 stop-instances --instance-ids ${{ steps.resolve.outputs.instance_ids }}
